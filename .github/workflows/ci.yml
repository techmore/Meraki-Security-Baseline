name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # Install any optional packages used by the project
          pip install weasyprint 2>/dev/null || echo "weasyprint optional – skipping"

      - name: Lint (syntax check)
        run: |
          python -m py_compile meraki_backup.py
          python -m py_compile report_generator.py
          python -m py_compile meraki_env.py
          for f in reporting/*.py; do python -m py_compile "$f"; done

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
